[project]
name = "denisecase-civic-interconnect-org-context"
description = "Org-level conventions for denisecase / civic-interconnect Python repositories, derived from three source repos with explicit authority scoping and four ao-config layers."
since = "2026"
primary_language = "python"

[alignment]
# ao-config.toml [owner] best_practices_stance = "balanced".
# Consistent with all three sources: strict tooling baseline (pyright strict,
# ruff D/S/B/RET rules, bandit, deptry) with targeted pragmatic exceptions
# (S101 allowed, line-length varies, informal commits, no coverage threshold enforced).
best_practices_stance = "balanced"

[conventions]
# [S3: conventions authority]
# ao-config.toml confirmed=false: naming = "snake_case files/functions/variables; PascalCase classes"
# Verification:
#   snake_case: MATCH — observed in all module names, function names, variables across S1/S2/S3
#   PascalCase: MATCH (observed in S2 domain models: FactorSpec, Candidate, Policy, ScoreRule,
#   CandidateResult); UNVERIFIABLE in S1/S3 (no user-defined classes present)
# ao-config-python.toml confirmed=false: naming = same
# Result: MATCH (snake_case); MATCH with note (PascalCase from S2 observation)
naming = "snake_case for files, functions, and variables (observed in all three sources); PascalCase for classes (declared in ao-config.toml and ao-config-python.toml; observed in S2 domain models — FactorSpec, Candidate, Policy, ScoreRule; unverifiable in S1/S3 which have no user-defined classes) [S3 authority; ao-config/ao-config-python confirmed=false verified MATCH]"

# [S3: conventions authority + S1: pyproject authority for enforcement]
# ao-config-python.toml confirmed=false: structure = "src layout: src/<package>/, tests/, docs/"
# Verification: MATCH — all three repos use src layout, tests/, docs/; pyproject.toml is
# single source of truth per REQ.PYTHON comment in S1 and S2.
structure = "src layout: src/<package>/, tests/, docs/; pyproject.toml is single source of truth (REQ.PYTHON comment in S1 and S2); docs/ structure varies: S1/S2 use docs/en/ for Zensical; S3 has extensive workflow-a/b/c/glossary/reference structure [S3 authority, verified across all three sources]"

# [S1: pyproject authority] Ruff enforced in all three repos via pre-commit and CI.
# ao-config-python.toml confirmed=false: style_enforced_by = "ruff"
# Verification: MATCH. Conflict recorded in divergences: S3 uses narrower ruff rule set.
style_enforced_by = "ruff (lint + format) via pre-commit hooks and GitHub Actions CI; rule set: E,F,W,I,UP,B,C4,SIM,RET,PTH,D,S [S1/S2 authority]; S3 uses narrower set (E,F,W,I,UP,B,PTH — no D,S,C4,SIM,RET) [conflict recorded in divergences]"

# [S2: testing authority]
# ao-config-python.toml confirmed=false: test_naming = "test_<module>.py; test_<function>_<condition>"
# Verification: MATCH across all three repos. S2 adds builders.py pattern.
test_pattern = "tests/ directory; test_<module>.py naming mirroring src modules; pytest with pytest-cov; test_<behavior>_<expected_outcome>() naming for individual tests [S2 authority]; test builder pattern: shared test data constructed in tests/builders.py with keyword-override builder functions [S2 observed]; pytest.raises() for error cases; full type annotations in test signatures [S2 observed]"

# [S3: conventions authority]
# ao-config.toml confirmed=false: commit_style = "conventional commits"
# Verification: CONFLICT across all three sources.
#   S1 git history: "Prep v1.0.0", "Prep v0.9.6" (informal)
#   S2 git history: "ignore pygments", "Prep v0.2.2", "chore", "update" (informal)
#   S3 git history: "Spring 2026", "update", "portfolio page" (informal)
#   README examples (S1, S3): git commit -m "update"
#   No commitlint, commitizen, or conventional-commits pre-commit hook in any repo
# Handling: confirmed=false → observed pattern used; conflict recorded in divergences.
commit_style = "not CI-enforced; observed commits are informal across all three sources ('Prep v1.0.0', 'Prep v0.2.2', 'Spring 2026', 'update'); README examples show 'update'; CHANGELOG.md uses Keep a Changelog format where present; no conventional commits tooling in any repo [conflicts with ao-config.toml default 'conventional commits']"

[code_style]
# ao-config-python.toml [defaults.python.code_style] confirmed=false: max_function_lines = 30
# Scaffold layer overrides to 0 for S3 (confirmed=false but higher-priority layer).
# Verification S1: body-only lines ≤15 (total incl. docstrings up to 33) — MATCH ≤30
# Verification S2: functions ≤60 lines total; body-only generally ≤30 — MATCH
# Verification S3: all functions ≤20 lines — would MATCH 30; scaffold layer sets 0 (unenforced)
max_function_lines = 30   # S1/S2 (pypi repos); 0 for S3 (scaffold layer overrides — unenforced)

# ao-config-python.toml confirmed=false: max_cyclomatic_complexity = 5
# Verification: C90/McCabe rule not enabled in ruff config of any repo; cannot verify CI limit
# Result: UNVERIFIABLE — recorded in gaps
max_cyclomatic_complexity = 5   # declared in ao-config-python.toml (confirmed=false); not CI-enforced in any repo (C90 not in ruff select); recorded in gaps

# ao-config-python.toml confirmed=false: max_nesting_depth = 3
# Verification: no nesting depth rule in ruff config of any repo; observed code is flat
# Result: declared value retained; no CI enforcement; recorded in gaps
max_nesting_depth = 3   # declared in ao-config-python.toml (confirmed=false); not CI-enforced; observed code is flat (no violations seen)

# ao-config.toml and ao-config-python.toml confirmed=false: prefer_early_returns = true
# Verification: ruff RET rule group enabled in S1 and S2 pyproject.toml; early return
# observed in S2 evaluator.py (early None return in score loop); S1 _configure_handlers()
# Result: MATCH
prefer_early_returns = true   # [ao-config and ao-config-python confirmed=false; ruff RET rules in S1/S2; early return pattern observed in S1/S2]

# [S2: docstrings authority]
# ao-config-python.toml confirmed=false: docstring_style = "google"
# Verification: MATCH all three. S1: pydocstyle convention = "google". S2: REQ comment
# declares "Google style is the default policy for this repository." S3: pydocstyle = "google"
# in pyproject.toml. S3 extends Google with pedagogical sections (Module Information, Key
# Concepts) — documented as S3-specific divergence.
docstring_style = "google"   # [ao-config-python confirmed=false; MATCH across all three sources; S2 docstrings authority; S3 extends with pedagogical sections — recorded in divergences]

# [S2: docstrings authority]
# ao-config-python.toml confirmed=false: docstring_required_on = "all public functions and classes"
# Verification: MATCH S1 (ruff D rules, REQ comments). MATCH S2 (ruff D rules, REQ comment
# explicitly declaring Google style policy). CONFLICT S3 (no D rules in S3 ruff select list).
# S2 (docstrings authority) wins. S3 divergence recorded.
docstring_required_on = "all public modules and public functions [ao-config-python confirmed=false; MATCH S1 and S2 — ruff D rules enabled, REQ comments present; CONFLICT with S3 which does not enable D rules in ruff config; S2 docstrings authority prevails — conflict in divergences]"

# [S2: type_annotations authority]
# ao-config-python.toml (confirmed=true): type_checker = "pyright strict"
# Verification: MATCH S1 ([tool.pyright] typeCheckingMode = "strict"). MATCH S2 (same).
# PARTIAL S3 (pyright in dev deps but no [tool.pyright] section; strictness unknown).
# Scaffold layer: type_annotations = "optional; encouraged but not required" (confirmed=false, for S3)
type_annotations = "required on all public functions and return types; pyright strict (typeCheckingMode = 'strict') [ao-config-python confirmed=true; MATCH S1/S2; S3 PARTIAL — pyright in deps but no [tool.pyright] config block, typeCheckingMode unknown; scaffold layer declares 'optional; encouraged but not required' for S3] [S2 type_annotations authority]"

# [ao-config.toml and ao-config-python.toml confirmed=false]
# Verification: REQ:/WHY:/OBS: prefix pattern observed consistently in source files,
# config files, and CI workflows across all three repos.
comment_style = "REQ:/WHY:/OBS: prefix pattern for inline comments; explain rationale not mechanics; no commented-out code [ao-config confirmed=false; MATCH across all three sources; S3 conventions authority confirms pattern present]"

# [S1: pyproject authority]
# ao-config-python.toml confirmed=false: import_order = "stdlib, third-party, local; absolute imports only"
# Verification: ruff isort (I rules) with force-sort-within-sections = true in S1, S2, S3.
# Absolute imports observed in all three repos.
import_order = "stdlib, third-party, local; ruff isort (I rules); force-sort-within-sections = true; absolute imports only [ao-config-python confirmed=false; MATCH across all three sources; S1 pyproject authority]"

