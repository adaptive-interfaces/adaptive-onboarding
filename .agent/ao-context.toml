# confirmed=true: MATCH S1, S2, S3
linter = "ruff check"   # [ao-config-python confirmed=true; MATCH S1/S2/S3]

# confirmed=true: MATCH S1 ([tool.pyright] typeCheckingMode = "strict"), S2 (same)
# CONFLICT S3: pyright in dev deps but no [tool.pyright] section in pyproject.toml
