[project]
name = "denisecase-org-context"
description = "Org-level conventions for denisecase / civic-interconnect Python repositories, derived from three source repos with explicit authority scoping."
since = "2026"
primary_language = "python"

[alignment]
# Inferred: no explicit best_practices_stance declared in any source.
# Evidence across all three repos: strict tooling (pyright strict, ruff D/S rules,
# bandit, deptry) with targeted pragmatic exceptions (S101 allowed, line-length
# varies by repo, informal commits). Consistent with a balanced stance.
best_practices_stance = "balanced"

[conventions]
# [S3: conventions authority] snake_case observed across all three repos in all module
# names, function names, and variable names. No class definitions observed in S3
# to confirm PascalCase, but S2 (MEE) uses dataclasses — PascalCase inferred.
naming = "snake_case for files, functions, and variables (observed in all three sources); PascalCase for classes (observed in S2: FactorSpec, Candidate, Policy, ScoreRule, etc.)"

# [S3: conventions authority] src layout confirmed in all three repos.
# docs/ structure varies: S1 has docs/en/, S2 has docs/en/, S3 has extensive
# workflow-a/b/c/glossary/reference structure.
structure = "src layout: src/<package>/, tests/, docs/; pyproject.toml is single source of truth (REQ.PYTHON comment in S1 and S2)"

# [S1: pyproject authority] ruff is enforced in all three repos via pre-commit
# and CI. S1 and S2 have identical ruff rule sets (E,F,W,I,UP,B,C4,SIM,RET,PTH,D,S).
# S3 uses a narrower set (E,F,W,I,UP,B,PTH only — no D,S,C4,SIM,RET).
# S1 is authoritative for pyproject (ruff config). S2 is authoritative for
# docstrings (requires D rules). Conflict with S3 recorded in divergences.
style_enforced_by = "ruff (lint + format) via pre-commit hooks and GitHub Actions CI; rule set: E,F,W,I,UP,B,C4,SIM,RET,PTH,D,S [S1/S2 authority]"

# [S2: testing authority] All three repos use tests/ with test_<module>.py naming.
# S2 additionally uses a builders.py pattern for test data construction and
# descriptive test names (test_<behavior>_<condition>).
test_pattern = "tests/ directory; test_<module>.py naming; pytest with pytest-cov; test builders pattern (builders.py for shared test data); descriptive test names: test_<behavior>_<expected_outcome>(); pytest.raises() for error cases; full type annotations in test signatures [S2 authority]"

# [S3: conventions authority] All three repos use informal commit messages.
# README examples in S1 and S3 both show 'update'. No conventional commits
# tooling found in any repo. S3's documentation targets student users.
commit_style = "not enforced by CI or pre-commit; CHANGELOG.md follows Keep a Changelog format (Added/Updated/Removed sections) where present; README examples show informal messages ('update'); no conventional commits tooling found in any source [S3 authority]"

[code_style]
# Not configured as a limit in any repo. S2 functions are generally ≤60 lines.
max_function_lines = 0
max_cyclomatic_complexity = 0
max_nesting_depth = 0

# [S1 pyproject authority + S2 testing/type_annotations authority] ruff RET rules
# selected in S1 and S2; observed in S2 evaluator.py (early returns on None scores).
prefer_early_returns = true

# [S2: docstrings authority] Google convention explicitly declared in pyproject.toml
# with a REQ comment: "REQ: Google style is the default policy for this repository."
# S1 also declares Google via pydocstyle convention = "google".
# S3 uses Google convention config but has verbose pedagogical additions
# (Module Information, Key Concepts, Arguments: None sections) beyond standard Google.
# S2 wins on docstring authority: standard Google with Args/Returns/Raises sections.
docstring_style = "google"

# [S2: docstrings authority] S1 and S2 both enable ruff D rules and require docstrings
# on all public modules and functions. S3 does not enable D rules in its ruff config.
# S2 (authoritative for docstrings) wins; D rules required on public modules and
# public functions. Conflict with S3 recorded in divergences.
docstring_required_on = "all public modules and all public functions [S2 authority; D rules enabled and REQ comment present in S1 and S2; S3 does not enable D rules — conflict recorded in divergences]"

# [S2: type_annotations authority] S1 and S2 both configure pyright strict
# (typeCheckingMode = 'strict' in [tool.pyright]). S2 also uses Python 3.12+
# type alias syntax (type PrimitiveValue = str | float | bool). S3 has pyright
# in dev deps but no [tool.pyright] configuration block in pyproject.toml.
type_annotations = "required on all public functions and return types; pyright strict (typeCheckingMode = 'strict'); Python 3.12+ type alias syntax (type X = ...) acceptable [S2 authority]"

# [S3: conventions authority + S1 observation] REQ:/WHY:/OBS: prefix pattern
# observed consistently across all three repos in source files, config files, and CI.
comment_style = "REQ:/WHY:/OBS: prefix pattern for inline comments; explain rationale not mechanics; no commented-out code [S3 authority, confirmed across all three sources]"

# [S1: pyproject authority] ruff isort (I rules) with force-sort-within-sections = true
# in S1, S2, and S3. Absolute imports observed in all three repos.
import_order = "stdlib, third-party, local; ruff isort (I rules); force-sort-within-sections = true; absolute imports only [S1 authority, confirmed across all three sources]"

[python]
# [S1: packaging authority]
package_manager = "uv"
# [S1: packaging authority]
layout = "src"
# [S1: packaging authority] S1 and S2 use setuptools + setuptools_scm (dynamic
# versioning from git tags). S3 uses setuptools with a static version = "0.1.0"
# (template/starter repo; not published to PyPI). Conflict recorded in divergences.
build_backend = "setuptools with setuptools_scm for published packages (dynamic git-tag versioning); setuptools with static version for template/starter repos [S1 authority; S3 diverges]"
# [S1: pyproject authority]
formatter = "ruff format"
# [S1: pyproject authority]
linter = "ruff check"
# [S2: type_annotations authority]
type_checker = "pyright strict"
# [S2: testing authority]
test_runner = "pytest"
# [S1: ci authority]
ci = "github-actions"

[done]
# [S1: ci authority] Derived from CI workflow (ci-python-zensical.yml) enforced steps.
# S2 has an identical CI structure. S3 has the same workflow name.
definition = "all tests pass, ruff format clean, ruff check clean, pyright clean, pre-commit hooks pass (trailing-whitespace, end-of-file-fixer, check-toml, check-yaml, ruff-format, ruff), validate-pyproject clean [S1 ci authority]"
review_required = ""
ci_must_pass = true
# [S1: ci authority] All three repos have deploy-zensical.yml and GitHub Pages badges.
deploy_process = "merge to main triggers GitHub Pages docs deploy via deploy-zensical.yml; PyPI release via release.yml for published packages [S1 ci authority]"

[ownership]
# All observed repos are solo projects by Denise Case (denisecase org) or civic-interconnect.
# No team ownership map declared in any source.
# civic-interconnect (S2) is a separate GitHub org; single author observed.

[norms]
# [S3: conventions authority, confirmed across all three sources]
req_why_obs_pattern = "inline comments use REQ:/WHY:/OBS: prefixes throughout source, config, and CI files to document requirements, rationale, and observations"

# [S1 observed, S3 uses datafun-toolkit as a dependency]
uv_primary = "uv is the primary package manager for all local installs and command execution; pip install listed as alternative for end users in S1 README"

# [S1: ci authority] ABCD labeling observed in ci-python-zensical.yml in S1 and S2.
abcd_ci_ordering = "CI/CD steps labeled A (Assemble), B (Baseline), C (Coverage/Tests), D (Deploy) in ci-python-zensical.yml [S1 ci authority, confirmed in S2]"

# [S2: testing authority] builders.py test fixture pattern observed in S2.
test_builder_pattern = "shared test data constructed via builder functions in tests/builders.py; builder functions use sensible defaults with keyword-override arguments [S2 testing authority]"

# [S1 and S2 observed; S3 uses datafun-toolkit logger]
privacy_safe_logging = "never log usernames, hostnames, or full absolute paths; use repo-relative paths; privacy-safe helpers provided by datafun-toolkit"

# [S3: documentation authority]
student_facing_docs = "documentation targets post-secondary education audience; step-by-step workflow guides (workflow-a/b/c), glossary, and reference sections organized under docs/ [S3 documentation authority]"

# [S1 and S2 observed] Both S1 and S2 publish to PyPI.
pypi_published = "published packages (S1: datafun-toolkit, S2: multidimensional-evaluation-engine) have PyPI release workflows; S3 (pro-analytics-02) is a template/starter and not published to PyPI"

[tools]
registry = ""

