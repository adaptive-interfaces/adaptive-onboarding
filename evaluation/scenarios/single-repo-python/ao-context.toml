[project]
name = "datafun-toolkit"
description = "Privacy-safe diagnostics, paths, and logging helpers for analytics projects."
since = "2026"
primary_language = "python"

[alignment]
# Declared in ao-config.toml [owner] best_practices_stance = "balanced".
# Consistent with observed pattern: strict tooling baseline (pyright strict,
# ruff D/S/B/RET rules, bandit, deptry) combined with pragmatic exceptions
# (S101 allowed, line-length 100, informal commits).
best_practices_stance = "balanced"

[conventions]
# ao-config.toml [defaults.conventions] naming = "snake_case files/functions/variables;
# PascalCase classes" (confirmed=false).
# Verification: snake_case MATCHES — observed in all source module names
# (logger.py, diagnostics.py, paths.py), function names (get_logger, log_header,
# log_path, find_project_root, safe_relpath_str), and variables (ROOT_PATH, log_file).
# PascalCase classes: UNVERIFIABLE — no user-defined classes in src/datafun_toolkit/*.py.
naming = "snake_case for files, functions, and variables (observed in all source modules; matches ao-config.toml default); PascalCase for classes (declared in ao-config.toml; unverifiable — no user-defined classes in source)"

# Observed from pyproject.toml: package-dir = {"" = "src"}, package discovery in src/.
# Source in src/datafun_toolkit/; tests/ mirrors src modules; docs/en/ for Zensical docs.
structure = "src layout: src/datafun_toolkit/, tests/ (test_<module>.py mirrors src modules), docs/en/; pyproject.toml is single source of truth (REQ.PYTHON comment in pyproject.toml)"

# Observed: ruff (format + lint) via pre-commit (astral-sh/ruff-pre-commit rev v0.15.5)
# and CI steps D1/D2 in ci-python-zensical.yml.
style_enforced_by = "ruff (format + lint) via pre-commit hooks and GitHub Actions CI (ci-python-zensical.yml D1/D2)"

# Observed: tests/ directory; test_<module>.py naming; [tool.pytest.ini_options]
# in pyproject.toml; pytest + pytest-cov in dev deps.
test_pattern = "tests/ directory; test_<module>.py naming mirroring src modules; pytest with pytest-cov; testpaths = ['tests']; addopts = '-q --cov=datafun_toolkit --cov-report=term-missing'"

# ao-config.toml [defaults.conventions] commit_style = "conventional commits"
# (confirmed=false).
# Verification: CONFLICT.
# Observed git history: "Prep v1.0.0", "Prep v0.9.6" (human-authored, informal).
# README Developer Setup example: git commit -m "update".
# CHANGELOG.md uses Keep a Changelog format (Added/Updated sections).
# No commitlint, commitizen, or conventional-commits pre-commit hook present.
# Declared value NOT supported by evidence; conflict recorded in meta.divergences.
commit_style = "not CI-enforced; observed human commits are informal ('Prep v1.0.0', 'Prep v0.9.6'); README shows 'update'; CHANGELOG uses Keep a Changelog format; no conventional commits tooling [conflicts with ao-config.toml default]"

[code_style]
# Not configured as a ruff rule or CI limit. ao-config.toml does not declare
# max_function_lines. Observed function body lines: all ≤15 (excluding docstrings).
# Total function lines including docstrings: get_logger 33, _configure_handlers 31.
max_function_lines = 0

max_cyclomatic_complexity = 0
max_nesting_depth = 0

# ao-config.toml [defaults.code_style] prefer_early_returns = true (confirmed=false).
# Verification: MATCH. Ruff RET rules enabled in [tool.ruff.lint].select.
# Observed: early return in _configure_handlers() (if logger.handlers: return).
prefer_early_returns = true

# ao-config.toml [defaults.code_style] prefer_small_functions = "each function does
# one thing; extract helpers rather than growing" (confirmed=false).
# Verification: MATCH. get_logger() delegates handler setup to _configure_handlers();
# each function in source has a single, named purpose; no large multi-purpose functions.
# Recorded in norms (qualitative pattern, not a measurable code_style field).

# ao-config.toml [defaults.code_style] docstring_style (not declared; ao-config
# does not include docstring fields in code_style section).
# Observed: [tool.ruff.lint.pydocstyle] convention = "google" in pyproject.toml.
docstring_style = "google"

# Observed: ruff D rules in [tool.ruff.lint].select; REQ comments in every source
# module explicitly require module-level and public function docstrings.
# ao-config.toml does not declare this field in code_style; derived from observation.
docstring_required_on = "all public modules and public functions (ruff D rules enforced; REQ inline comments require docstrings in every source file)"

# Observed: all public function signatures carry parameter and return type annotations.
# pyright typeCheckingMode = "strict" enforces this in CI.
# ao-config.toml does not declare type_annotations; derived from observation.
type_annotations = "required on all public functions and return types; pyright strict (typeCheckingMode = 'strict' in [tool.pyright])"

# ao-config.toml [defaults.code_style] comment_style = "explain why not what;
# no commented-out code; use REQ/WHY/OBS prefixes" (confirmed=false).
# Verification: MATCH. REQ:/WHY:/OBS: prefix pattern observed consistently across
# all source files (logger.py, diagnostics.py, paths.py), pyproject.toml,
# .pre-commit-config.yaml, and ci-python-zensical.yml. No commented-out code
# observed in any source file.
comment_style = "REQ:/WHY:/OBS: prefix pattern throughout source, config, and CI files; explain rationale not mechanics; no commented-out code"

# Observed: ruff isort I rules; force-sort-within-sections = true in pyproject.toml;
# absolute imports in all source modules.
import_order = "stdlib, third-party, local; ruff isort (I rules); force-sort-within-sections = true; absolute imports only"

[python]
# Python-specific fields derived entirely from observation (ao-config.toml has no
# [defaults.python] section in the current version).

# Observed: CI uses astral-sh/setup-uv@v7; README uses uv sync/run/tool commands;
# uv.lock present.
package_manager = "uv"

# Observed: pyproject.toml [tool.setuptools] package-dir = {"" = "src"}.
layout = "src"

# Observed: [build-system] build-backend = "setuptools.build_meta" with
# setuptools_scm>=9.2.2 for dynamic versioning from git tags.
# ao-config.toml does not declare build_backend; derived from observation.
build_backend = "setuptools with setuptools_scm (dynamic versioning from git tags ^v\\d+\\.\\d+\\.\\d+$; fallback_version = '0.0.1')"

# Observed: ruff format via pre-commit ruff-format hook and CI D1 step.
formatter = "ruff format"

# Observed: ruff check via pre-commit ruff hook (--fix, --exit-non-zero-on-fix)
# and CI D2 step.
linter = "ruff check"

# Observed: [tool.pyright] typeCheckingMode = "strict" in pyproject.toml; pyright
# in dev deps.
type_checker = "pyright strict"

# Observed: [tool.pytest.ini_options] in pyproject.toml; pytest + pytest-cov in dev deps;
# CI step C1 runs pytest with coverage.
test_runner = "pytest"

# Observed: .github/workflows/ contains ci-python-zensical.yml, deploy-zensical.yml,
# release.yml, links.yml.
ci = "github-actions"

[done]
# ao-config.toml [defaults.done] ci_must_pass = true (confirmed=false).
