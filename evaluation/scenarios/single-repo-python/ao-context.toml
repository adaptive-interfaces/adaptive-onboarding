# ao-config.toml [defaults.done] review_required = "" (confirmed=false).
# Verification: CONSISTENT. Solo project by Denise Case; no team review process observed.
review_required = ""

ci_must_pass = true

# Observed: .github/workflows/deploy-zensical.yml deploys to GitHub Pages on merge
# to main. .github/workflows/release.yml handles PyPI releases.
deploy_process = "merge to main triggers GitHub Pages docs deploy (deploy-zensical.yml); PyPI release via release.yml"

